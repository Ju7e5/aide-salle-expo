[build]
builder = "nixpacks"
buildCommand = "find .next/cache -mindepth 1 -depth -delete 2>/dev/null; npx prisma generate && npm run build"

[deploy]
startCommand = "npx prisma db push && npm run db:seed && npm start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
